version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: goim-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: goim-zookeeper
    restart: unless-stopped
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    volumes:
      - zookeeper_data:/bitnami

  kafka:
    image: bitnami/kafka:3.7
    container_name: goim-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami

  mysql:
    image: mysql:8.0
    container_name: goim-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=goim
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: golang:1.25
    container_name: goim-app
    restart: unless-stopped
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8888}:8888"
      - "${GRPC_PORT:-50051}:50051"
    env_file:
      - .env
    environment:
      - IM_DB_DRIVER=mysql
      - IM_DB_DSN=root:secret@tcp(mysql:3306)/goim?charset=utf8mb4&parseTime=True&loc=Local
    volumes:
      - ./:/app
    command: >
      sh -c "
      go mod download &&
      go run main.go
      "

volumes:
  redis_data:
  zookeeper_data:
  kafka_data:
  mysql_data:
